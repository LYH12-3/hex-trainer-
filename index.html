<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>大框进制训练器</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<!-- 强制更新：每次改 ?v= 后面数字即可 -->
<link rel="stylesheet" href="index.css?v=20250601002">
<style>
/* ===== 通用 ===== */
*{box-sizing:border-box}
body{margin:0;font-family:Helvetica,Arial;background:linear-gradient(135deg,#1e1e2e 0%,#2a2a3a 100%);color:#fff;display:flex;flex-direction:column;height:100vh}
button{cursor:pointer;border:none;transition:.2s}
button:active{transform:scale(.98)}
/* 顶部内容区 */
.content{flex:1;display:flex;flex-direction:column;align-items:center;padding:15px 10px 60px;width:100%;max-width:500px;margin:0 auto}
.page{display:none;width:100%}
.page.active{display:flex;flex-direction:column;align-items:center}
.back{font-size:16px;margin-bottom:10px;color:#ccc;text-decoration:underline}
/* 大按钮 */
.big-btn{width:90%;max-width:400px;font-size:22px;padding:16px 0;margin:12px 0;border-radius:30px;background:linear-gradient(135deg,#ff4757 0%,#d93025 100%);color:#fff;box-shadow:0 4px 15px rgba(255,71,87,.4)}
.big-btn.green{background:linear-gradient(135deg,#2ed573 0%,#1e90ff 100%);box-shadow:0 4px 15px rgba(46,213,115,.4)}
.big-btn.blue{background:linear-gradient(135deg,#1e90ff 0%,#0984e3 100%);box-shadow:0 4px 15px rgba(30,144,255,.4)}
.big-btn.purple{background:linear-gradient(135deg,#8e44ad 0%,#9b59b6 100%);box-shadow:0 4px 15px rgba(142,68,173,.4)}
/* 底部导航常驻 */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:50px;background:#111;display:flex;justify-content:space-around;align-items:center;box-shadow:0 -2px 8px rgba(0,0,0,.4)}
.tabbar button{flex:1;height:100%;background:none;color:#aaa;font-size:14px;border:none}
.tabbar button.active{color:#fff;background:#222}
/* 计算页 */
textarea{width:100%;font-size:18px;padding:12px;border-radius:12px;border:none;margin:10px 0;resize:none}
input{width:100%;font-size:18px;padding:12px;border-radius:12px;border:none;margin:10px 0}
.output{background:#232334;height:180px;color:#fff}
</style>
</head>
<body>

<div class="content">
  <!-- ① 主页 -->
  <div id="main" class="page active">
    <h1>大框进制训练器</h1>
    <button class="big-btn blue" onclick="showPage('practice')">二进制练习</button>
    <button class="big-btn green" onclick="showPage('choose')">转换（进制互转）</button>
  </div>

  <!-- ② 练习页 -->
  <div id="practice" class="page">
    <span class="back" onclick="showPage('main')">← 返回</span>
    <h2 id="practiceTitle">二进制练习</h2>
    <select id="bits">
      <option value="4">4 位</option>
      <option value="8" selected>8 位</option>
      <option value="16">16 位</option>
      <option value="32">32 位</option>
    </select>
    <button class="big-btn blue" onclick="generate()">生成</button>
    <textarea id="outPractice" placeholder="点击生成或回车递进"></textarea>
    <button class="big-btn green" onclick="convertAll()">转换（四行）</button>
  </div>

  <!-- ③ 选择转换页 -->
  <div id="choose" class="page">
    <span class="back" onclick="showPage('main')">← 返回</span>
    <h2>选择转换类型</h2>
    <button class="big-btn red" onclick="openConvert(2)">二进制转其他</button>
    <button class="big-btn green" onclick="openConvert(8)">八进制转其他</button>
    <button class="big-btn blue" onclick="openConvert(10)">十进制转其他</button>
    <button class="big-btn purple" onclick="openConvert(16)">十六进制转其他</button>
  </div>

  <!-- ④ 独立转换页 -->
  <div id="convert" class="page">
    <span class="back" onclick="showPage('choose')">← 返回</span>
    <h2 id="convertTitle"></h2>
    <textarea id="inConvert" placeholder="输入进制数"></textarea>
    <button class="big-btn" id="convertBtn" onclick="convertOne()">生成/转换</button>
    <div id="outs">
      <textarea class="output" id="out1" readonly></textarea>
      <textarea class="output" id="out2" readonly></textarea>
      <textarea class="output" id="out3" readonly></textarea>
    </div>
    <button class="big-btn purple" onclick="clearConvert()">清空</button>
  </div>

  <!-- ⑤ 计算页 -->
  <div id="calc" class="page">
    <span class="back" onclick="showPage('convert')">← 返回</span>
    <h2>进制计算过程</h2>
    <input id="calcIn" placeholder="例：0b101+0o37*0xA  或  123+456">
    <button class="big-btn green" onclick="doCalc()">计算</button>
    <textarea class="output" id="calcOut" readonly></textarea>
  </div>

  <!-- ⑥ 详细页 -->
  <div id="detail" class="page">
    <span class="back" onclick="showPage('main')">← 返回</span>
    <h2>详细说明</h2>
    <textarea readonly>功能列表：
1. 二进制练习：随机生成指定位宽二进制，一键查看四进制结果。
2. 转换：任意进制→其它三进制。
3. 计算：支持 0b/0o/0d/0x 混合运算，输出竖式过程。
4. 本工具纯离线，无需联网。
    </textarea>
  </div>

  <!-- ⑦ 更多1 -->
  <div id="more1" class="page">
    <span class="back" onclick="showPage('main')">← 返回</span>
    <h2>更多功能</h2>
    <button class="big-btn purple" onclick="alert('敬请期待')》进制表</button>
    <button class="big-btn blue" onclick="alert('敬请期待')》位运算</button>
  </div>

  <!-- ⑧ 更多2 -->
  <div id="more2" class="page">
    <span class="back" onclick="showPage('main')">← 返回</span>
    <h2>工具相关</h2>
    <button class="big-btn green" onclick="checkUpdate()》检查更新</button>
    <button class="big-btn red" onclick="alert('作者：大框')》关于</button>
  </div>

  <!-- ⑨ 我的 -->
  <div id="mine" class="page">
    <span class="back" onclick="showPage('main')">← 返回</span>
    <h2>我的</h2>
    <button class="big-btn blue" onclick="alert('暂无记录')》历史记录</button>
    <button class="big-btn" style="background:#666" onclick="alert('已是最新版')》设置</button>
  </div>
</div>

<!-- ▼▼▼ 底部导航 ▼▼▼ -->
<div class="tabbar">
  <button onclick="showTab('main')" id="tab-main" class="active">主页</button>
  <button onclick="showTab('detail')" id="tab-detail">详细</button>
  <button onclick="showTab('more1')" id="tab-more1">更多</button>
  <button onclick="showTab('more2')" id="tab-more2">更多</button>
  <button onclick="showTab('mine')" id="tab-mine">我的</button>
</div>

<script>
/* ========= 页面切换 ========= */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // 底部高亮
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id.split('-').pop())?.classList.add('active');
}
function showTab(id){
  showPage(id);
}

/* ========= 强制更新检查 ========= */
async function checkUpdate(){
  try{
    const remote = await fetch('version.json?v='+Date.now()).then(r=>r.json());
    const local = {version:"20250601002"}; // 与 css 查询串保持一致
    if(remote.version !== local.version){
      if(confirm("发现新版本，是否立即更新？")){
        location.reload(true); // 强制走服务器
      }
    }else{
      alert("已是最新版");
    }
  }catch(e){
    alert("检查更新失败，稍后再试");
  }
}

/* ========= 练习页 ========= */
let practiceNum = 0;
function generate(){
  const b = parseInt(document.getElementById('bits').value);
  practiceNum = Math.floor(Math.random() * (1<<b));
  document.getElementById('outPractice').value = practiceNum.toString(2).padStart(b,'0');
  // 标题动态变
  document.getElementById('practiceTitle').textContent = "二进制练习（"+b+"位）";
}
function convertAll(){
  if(practiceNum===0){alert('请先生成！');return;}
  const out = `二进制 : ${practiceNum.toString(2).padStart(document.getElementById('bits').value,'0')}
八进制 : ${practiceNum.toString(8)}
十进制 : ${practiceNum}
十六进制: ${practiceNum.toString(16).toUpperCase()}`;
  document.getElementById('outPractice').value = out;
}

/* ========= 转换页 ========= */
let fromBase = 0;
function openConvert(base){
  fromBase = base;
  const names = {2:'二进制',8:'八进制',10:'十进制',16:'十六进制'};
  document.getElementById('convertTitle').textContent = names[base] + ' → 其它进制';
  document.getElementById('convertBtn').className = 'big-btn ' + ({2:'red',8:'green',10:'blue',16:'purple'}[base]);
  showPage('convert');
}
function convertOne(){
  const s = document.getElementById('inConvert').value.trim();
  if(!s){alert('请输入');return;}
  const ok = {2:/^[01]+$/,8:/^[0-7]+$/,10:/^\d+$/,16:/^[0-9A-Fa-f]+$/}[fromBase];
  if(!ok.test(s)){alert('非法输入');return;}
  const n = parseInt(s,fromBase);
  const map = {2:{a:'八进制',b:'十进制',c:'十六进制'},8:{a:'二进制',b:'十进制',c:'十六进制'},10:{a:'二进制',b:'八进制',c:'十六进制'},16:{a:'二进制',b:'八进制',c:'十进制'}};
  const res = {
    a: {2:n.toString(8), 8:n.toString(2), 10:n.toString(2), 16:n.toString(2)}[fromBase],
    b: {2:n.toString(10), 8:n.toString(10), 10:n.toString(8), 16:n.toString(8)}[fromBase],
    c: {2:n.toString(16), 8:n.toString(16), 10:n.toString(16), 16:n.toString(10)}[fromBase]
  };
  document.getElementById('out1').value = map[fromBase].a + ' : ' + res.a;
  document.getElementById('out2').value = map[fromBase].b + ' : ' + res.b;
  document.getElementById('out3').value = map[fromBase].c + ' : ' + res.c;
}
function clearConvert(){
  document.getElementById('inConvert').value = '';
  document.getElementById('out1').value = '';
  document.getElementById('out2').value = '';
  document.getElementById('out3').value = '';
}

/* ========= 计算页 ========= */
function doCalc(){
  const expr = document.getElementById('calcIn').value.trim();
  if(!expr){alert('请输入表达式');return;}
  const prepared = expr
    .replace(/0b([01]+)/g, (_,b)=>parseInt(b,2))
    .replace(/0o([0-7]+)/g, (_,o)=>parseInt(o,8))
    .replace(/0x([0-9A-Fa-f]+)/g, (_,h)=>parseInt(h,16));
  try{
    if(!/^[\d+\-*/()\s]+$/.test(prepared)) throw '含非法字符';
    const result = Math.floor(eval(prepared));
    const out = `计算过程（十进制）：
${expr}
= ${prepared}
= ${result}

各进制结果：
二进制  : ${result.toString(2)}
八进制  : ${result.toString(8)}
十进制  : ${result}
十六进制: ${result.toString(16).toUpperCase()}`;
    document.getElementById('calcOut').value = out;
  }catch(e){
    alert('表达式错误：'+e);
  }
}
</script>
</body>
</html>
